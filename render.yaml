services:
  - type: web
    name: agentguard-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
      - key: LOBSTERTRAP_URL
        value: "http://localhost:8080"
      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"
